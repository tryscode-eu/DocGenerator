name: DocGenerator CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docgenerator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
      - name: Install locked development dependencies
        run: |
          python -m pip install --require-hashes --requirement worker/requirements-dev.lock
          python -m pip install --no-deps --no-build-isolation --editable worker
          python -m pip check
      - name: Scan high-confidence secret signatures
        run: sh .github/scripts/scan_high_confidence_secrets.sh
      - name: Lint and format check
        run: |
          python -m ruff check main.py tests worker/doc_worker worker/tests worker/scripts/prove_minio_artifact_chain.py
          python -m ruff format --check main.py tests worker/doc_worker worker/tests worker/scripts/prove_minio_artifact_chain.py
      - name: Test ODT engine and document worker
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -p no:cacheprovider tests worker/tests
      - name: Compile Python sources
        run: >-
          python -m compileall -q
          main.py tests worker/doc_worker worker/tests
          worker/scripts/prove_minio_artifact_chain.py
      - name: Build worker wheel
        run: python -m build --no-isolation --wheel --outdir /tmp/docgenerator-dist worker
      - name: Build worker image
        run: docker build --file worker/Dockerfile --tag docgenerator-worker:test worker
      - name: Verify worker image boundaries
        run: |
          test "$(docker image inspect --format '{{.Config.User}}' docgenerator-worker:test)" = "10001:10001"
          test "$(docker image inspect --format '{{range .Config.Env}}{{println .}}{{end}}' docgenerator-worker:test | grep '^DOCUMENT_OUTPUT_DIR=')" = "DOCUMENT_OUTPUT_DIR=/data/documents"
          docker run --rm --entrypoint python docgenerator-worker:test -c \
            "import importlib.util, os; assert (os.getuid(), os.getgid()) == (10001, 10001); assert os.access('/data/documents', os.W_OK); assert importlib.util.find_spec('pytest') is None; import doc_worker.main"
